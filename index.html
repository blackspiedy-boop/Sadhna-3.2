<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sadhana</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%23000000'/%3E%3Ccircle cx='50' cy='50' r='34' fill='none' stroke='%2300C8FF' stroke-width='4' stroke-dasharray='4 6'/%3E%3Ccircle cx='50' cy='16' r='6' fill='%2300C8FF'/%3E%3C/svg%3E">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
/* ============================================================
   SADHANA v2.0 — PREMIUM DESIGN SYSTEM
   Deep royal blue / midnight navy glassmorphism theme.
   Organized: tokens → base → layout → navigation → components
   ============================================================ */

/* ---------- design tokens ---------- */
:root{
  /* core surfaces — black / electric blue */
  --bg:#000000;
  --bg-soft:#060606;
  --text-on-bg:#ffffff;
  --text-on-bg-muted:#a9bfe6;
  --surface:#0F52BA;
  --surface-rgb:15,82,186;
  --surface-2:#1660c9;
  --surface-3:#1d6dd6;
  --border:rgba(255,255,255,.16);
  --border-soft:rgba(0,200,255,.24);
  --border-strong:rgba(0,200,255,.45);

  /* text */
  --text:#ffffff;
  --text-muted:#b7c8ea;
  --text-faint:#8496c0;

  /* brand accent — electric blue */
  --accent:#00C8FF;
  --accent-2:#0072a8;
  --accent-3:#6fe0ff;
  --accent-soft:rgba(0,200,255,.18);
  --accent-grad:linear-gradient(135deg,#6fe0ff 0%,#00C8FF 45%,#0072a8 100%);
  --accent-grad-soft:linear-gradient(135deg, rgba(111,224,255,.22), rgba(0,114,168,.22));
  --on-accent:#001018;

  /* semantic */
  --good:#49b487;
  --good-soft:rgba(73,180,135,.16);
  --bad:#e2594f;
  --bad-soft:rgba(226,89,79,.16);

  /* elevation */
  --radius-sm:10px;
  --radius:16px;
  --radius-lg:22px;
  --shadow-1:0 1px 3px rgba(0,0,0,.45);
  --shadow-2:0 6px 18px rgba(0,0,0,.5);
  --shadow-3:0 14px 38px rgba(0,0,0,.6);
  --shadow-glow:0 4px 20px rgba(0,200,255,.4);
  --inset-hi:inset 0 1px 0 rgba(255,255,255,.08);

  /* motion */
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-spring:cubic-bezier(.22,1,.36,1);
  --dur-fast:.15s;
  --dur:.25s;
  --dur-slow:.45s;

  /* spacing scale */
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:28px;

  /* type */
  --font-display: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Noto Serif', serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --font-mono: 'SF Mono', 'Roboto Mono', 'Courier New', monospace;

  color-scheme: dark;
}
[data-theme="light"]{
  --bg:#eef2fb;
  --bg-soft:#e3eafa;
  --surface:#ffffff;
  --surface-rgb:255,255,255;
  --surface-2:#f0f4fd;
  --surface-3:#e6edfb;
  --border:#cfd9f2;
  --border-soft:rgba(40,81,214,.14);
  --border-strong:rgba(40,81,214,.26);
  --text:#0e1730;
  --text-muted:#586494;
  --text-faint:#8a93bd;
  --accent:#2851d6;
  --accent-2:#15316f;
  --accent-3:#3f6bf4;
  --accent-soft:rgba(40,81,214,.10);
  --accent-grad:linear-gradient(135deg,#4f7dfa 0%,#2851d6 55%,#15316f 100%);
  --accent-grad-soft:linear-gradient(135deg, rgba(79,125,250,.12), rgba(21,49,111,.10));
  --on-accent:#ffffff;
  --good:#2f8f5b;
  --good-soft:rgba(47,143,91,.12);
  --bad:#c0392b;
  --bad-soft:rgba(192,57,43,.12);
  --shadow-1:0 1px 3px rgba(30,50,100,.06);
  --shadow-2:0 6px 18px rgba(30,50,100,.08);
  --shadow-3:0 14px 34px rgba(30,50,100,.14);
  --shadow-glow:0 4px 18px rgba(40,81,214,.22);
  --inset-hi:inset 0 1px 0 rgba(255,255,255,.6);
  color-scheme: light;
}

/* ---------- base / reset ---------- */
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:
    radial-gradient(1100px 560px at 12% -8%, rgba(0,200,255,.14), transparent 58%),
    radial-gradient(900px 520px at 112% 8%, rgba(15,82,186,.20), transparent 55%),
    radial-gradient(800px 560px at 50% 118%, rgba(0,200,255,.08), transparent 62%),
    var(--bg);
  background-attachment:fixed;
  color:var(--text);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.5;
  min-height:100vh;
  padding-bottom:calc(78px + env(safe-area-inset-bottom));
  letter-spacing:.01em;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  transition:background .3s var(--ease), color .3s var(--ease);
}
::selection{background:var(--accent); color:var(--on-accent);}
h1,h2,h3{font-family:var(--font-display); font-weight:600; margin:0 0 4px; letter-spacing:.01em;}
h1{font-size:22px;} h2{font-size:19px;} h3{font-size:15px;}
button, input, select, textarea{font-family:inherit; color:inherit;}
button{
  transition:transform var(--dur-fast) var(--ease), background var(--dur) var(--ease),
    border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), opacity var(--dur) var(--ease), color var(--dur) var(--ease);
  min-height:36px;
}
button:active{transform:scale(.96);}
a{color:var(--accent);}
.num{font-family:var(--font-mono); font-variant-numeric:tabular-nums;}

/* focus-visible accessibility ring, keyboard only */
:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:6px;}
.icon-btn:focus-visible, .bottomnav button:focus-visible{outline-offset:3px;}

@keyframes fadeSlideIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}
@keyframes popIn{from{opacity:0; transform:scale(.92);} to{opacity:1; transform:scale(1);}}
@keyframes shimmer{0%{background-position:-300px 0;} 100%{background-position:300px 0;}}
main .card, main .page-title, main .grid2, main .grid3, main .subtabs{animation:fadeSlideIn .4s var(--ease-spring) backwards;}
main .card:nth-of-type(1){animation-delay:.02s;}
main .card:nth-of-type(2){animation-delay:.06s;}
main .card:nth-of-type(3){animation-delay:.1s;}
main .card:nth-of-type(4){animation-delay:.14s;}

/* ripple micro-interaction (added via JS on press) */
.ripple{position:absolute; border-radius:50%; background:rgba(255,255,255,.35); transform:scale(0); animation:rippleAnim .55s var(--ease) forwards; pointer-events:none;}
[data-theme="light"] .ripple{background:rgba(255,255,255,.55);}
@keyframes rippleAnim{to{transform:scale(2.6); opacity:0;}}

/* ============================================================
   TOP BAR
   ============================================================ */
.topbar{
  position:sticky; top:0; z-index:30;
  display:flex; align-items:center; justify-content:space-between;
  padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
  background:linear-gradient(180deg, var(--bg) 60%, transparent);
  backdrop-filter:blur(12px) saturate(1.3); -webkit-backdrop-filter:blur(12px) saturate(1.3);
}
.brand{display:flex; align-items:center; gap:11px; min-width:0;}
.brand .mark{width:32px;height:32px;flex:0 0 auto; filter:drop-shadow(0 0 7px rgba(63,107,244,.5));}
.brand .name{font-family:var(--font-display); font-size:19px; letter-spacing:.02em; line-height:1.15; color:var(--text-on-bg);}
.brand .date{display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-on-bg-muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.brand .streak-chip{
  display:inline-flex; align-items:center; gap:3px; padding:1px 7px 1px 5px; border-radius:20px;
  background:var(--accent-soft); color:var(--accent-3); font-weight:700; font-size:10.5px; flex:0 0 auto;
}
.topbar-actions{display:flex; gap:8px; flex:0 0 auto;}
.icon-btn{
  width:40px;height:40px;border-radius:50%; position:relative; overflow:hidden;
  border:1px solid var(--border-soft); background:rgba(var(--surface-rgb),.65);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer; box-shadow:var(--shadow-1);
}
.icon-btn:active{transform:scale(.90);}
.icon-btn svg{width:18px;height:18px;}

/* ============================================================
   NAV DRAWER
   ============================================================ */
.drawer-backdrop{
  position:fixed; inset:0; background:rgba(2,5,15,.55); backdrop-filter:blur(3px); z-index:40;
  opacity:0; pointer-events:none; transition:opacity var(--dur) var(--ease);
}
.drawer-backdrop.open{opacity:1; pointer-events:auto;}
.drawer{
  position:fixed; top:0; right:0; height:100%; width:80%; max-width:320px;
  background:rgba(var(--surface-rgb),.88); backdrop-filter:blur(22px) saturate(1.4); -webkit-backdrop-filter:blur(22px) saturate(1.4);
  z-index:41; padding:calc(20px + env(safe-area-inset-top)) 14px 20px;
  transform:translateX(105%); transition:transform var(--dur-slow) var(--ease-spring);
  overflow-y:auto; border-left:1px solid var(--border-soft); box-shadow:var(--shadow-3);
}
.drawer.open{transform:translateX(0);}
.drawer .drawer-head{display:flex; align-items:center; justify-content:space-between; padding:0 8px 14px; border-bottom:1px solid var(--border-soft); margin-bottom:6px;}
.drawer .drawer-head .name{font-family:var(--font-display); font-size:18px;}
.drawer h3{color:var(--text-faint); font-family:var(--font-body); font-size:10.5px; text-transform:uppercase; letter-spacing:.09em; margin:18px 8px 8px; font-weight:700;}
.drawer button.nav-item{
  display:flex; align-items:center; gap:12px; width:100%;
  background:none; border:none; text-align:left; padding:12px 10px;
  border-radius:12px; font-size:15px; color:var(--text); cursor:pointer; position:relative; overflow:hidden;
  transition:background var(--dur) var(--ease), color var(--dur) var(--ease);
}
.drawer button.nav-item:active{background:var(--surface-2);}
.drawer button.nav-item.active{background:var(--accent-grad-soft); color:var(--accent-3); font-weight:600;}
.drawer button.nav-item .dot{width:6px;height:6px;border-radius:50%;background:var(--border); transition:background var(--dur) var(--ease), box-shadow var(--dur) var(--ease); flex:0 0 auto;}
.drawer button.nav-item.active .dot{background:var(--accent-3); box-shadow:0 0 7px var(--accent-3);}

/* ============================================================
   BOTTOM NAVIGATION
   ============================================================ */
.bottomnav{
  position:fixed; bottom:0; left:0; right:0; z-index:30;
  display:flex; background:rgba(var(--surface-rgb),.85); backdrop-filter:blur(20px) saturate(1.3); -webkit-backdrop-filter:blur(20px) saturate(1.3);
  border-top:1px solid var(--border-soft); box-shadow:0 -8px 26px rgba(2,6,20,.26);
  padding:6px 6px calc(6px + env(safe-area-inset-bottom));
}
.bottomnav .nav-indicator{
  position:absolute; top:6px; height:calc(100% - 12px); border-radius:14px;
  background:var(--accent-grad-soft); border:1px solid var(--border-soft);
  transition:left var(--dur-slow) var(--ease-spring), width var(--dur-slow) var(--ease-spring);
  pointer-events:none; z-index:0;
}
.bottomnav{position:fixed;} /* keep positioning context */
.bottomnav-inner{position:relative; display:flex; width:100%;}
.bottomnav button{
  flex:1; background:none; border:none; display:flex; flex-direction:column;
  align-items:center; gap:3px; padding:7px 2px; color:var(--text-muted);
  font-size:10.5px; cursor:pointer; border-radius:12px; position:relative; z-index:1;
  transition:color var(--dur) var(--ease); min-height:48px;
}
.bottomnav button.active{color:var(--accent-3); font-weight:600;}
.bottomnav button svg{width:21px;height:21px; transition:filter var(--dur) var(--ease), transform var(--dur-slow) var(--ease-spring);}
.bottomnav button.active svg{filter:drop-shadow(0 0 6px rgba(63,107,244,.6)); transform:translateY(-1px);}

/* ============================================================
   LAYOUT
   ============================================================ */
main{padding:6px 16px 28px; max-width:640px; margin:0 auto;}
.page-title{padding:10px 2px 16px;}
.page-title h1{background:var(--accent-grad); -webkit-background-clip:text; background-clip:text; color:transparent;}
[data-theme="light"] .page-title h1{-webkit-background-clip:initial; background-clip:initial; color:var(--text);}
.page-title p{margin:3px 0 0; color:var(--text-on-bg-muted); font-size:13px;}

.grid2{display:grid; grid-template-columns:1fr 1fr; gap:11px;}
.grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}

/* ============================================================
   CARDS
   ============================================================ */
.card{
  background:linear-gradient(180deg, rgba(var(--surface-rgb),.9), rgba(var(--surface-rgb),.55));
  border:1px solid var(--border-soft); border-radius:var(--radius);
  padding:17px; margin-bottom:14px;
  backdrop-filter:blur(16px) saturate(1.2); -webkit-backdrop-filter:blur(16px) saturate(1.2);
  box-shadow:
    0 16px 30px rgba(0,0,0,.55),
    0 5px 12px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.16),
    inset 0 -16px 22px -16px rgba(0,0,0,.5);
  transition:box-shadow var(--dur) var(--ease), transform var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
@media (hover:hover){
  .card:hover{
    border-color:var(--border-strong);
    transform:translateY(-3px);
    box-shadow:
      0 22px 38px rgba(0,0,0,.6),
      0 8px 16px rgba(0,0,0,.5),
      inset 0 1px 0 rgba(255,255,255,.2),
      inset 0 -16px 22px -16px rgba(0,0,0,.55);
  }
}
.card.tight{padding:14px;}
.stat-label{font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); margin-bottom:8px; font-weight:600;}
.stat-value{font-family:var(--font-mono); font-size:22px; font-weight:700; letter-spacing:.01em;}
.stat-sub{font-size:11.5px; color:var(--text-muted); margin-top:5px; line-height:1.55;}

.section-title{
  font-family:var(--font-display); font-size:16.5px; margin:26px 2px 13px;
  display:flex; align-items:center; gap:9px; color:var(--text); font-weight:600;
}
.section-title .rule{flex:1; height:1px; background:linear-gradient(90deg, var(--border), transparent);}

/* mala ring - signature element */
.mala-wrap{display:flex; align-items:center; gap:20px;}
.mala-ring{position:relative; width:136px; height:136px; flex:0 0 auto;}
.mala-ring svg{width:100%; height:100%; filter:drop-shadow(0 0 10px rgba(63,107,244,.18));}
.mala-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.mala-center .n{font-family:var(--font-mono); font-size:27px; font-weight:700;}
.mala-center .lbl{font-size:9.5px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; text-align:center; max-width:80px;}

/* progress bar */
.pbar{height:10px; border-radius:7px; background:var(--surface-2); overflow:hidden; border:1px solid var(--border-soft); box-shadow:inset 0 1px 4px rgba(2,6,20,.3);}
.pbar > div{height:100%; background:var(--accent-grad); border-radius:7px; transition:width .6s var(--ease-spring); box-shadow:0 0 12px rgba(63,107,244,.55); position:relative;}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  background:var(--accent-grad); color:var(--on-accent); border:none; border-radius:13px;
  padding:13px 18px; font-size:14.5px; font-weight:600; cursor:pointer; position:relative; overflow:hidden;
  box-shadow:var(--shadow-glow); min-height:48px; letter-spacing:.01em;
}
.btn:active{box-shadow:0 2px 10px rgba(63,107,244,.3);}
.btn.secondary{background:rgba(var(--surface-rgb),.7); color:var(--text); border:1px solid var(--border-soft); box-shadow:var(--shadow-1);}
.btn.danger{background:linear-gradient(135deg,#ec6f66,var(--bad)); color:#fff; box-shadow:0 4px 16px rgba(226,89,79,.32);}
.btn.block{width:100%;}
.btn.sm{padding:8px 14px; font-size:12.5px; min-height:38px;}
.btn:disabled{opacity:.5; cursor:not-allowed;}

/* ============================================================
   FORM ELEMENTS
   ============================================================ */
.field{margin-bottom:15px;}
.field label{display:block; font-size:12px; color:var(--text-muted); margin-bottom:7px; font-weight:600; letter-spacing:.01em;}
.field input[type=number], .field input[type=text], .field input[type=date], .field input[type=time], .field select, .field textarea{
  width:100%; background:rgba(var(--surface-rgb),.55); border:1px solid var(--border-soft); border-radius:11px;
  padding:12px 13px; font-size:15px; color:var(--text); min-height:46px;
  transition:border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease), background var(--dur) var(--ease);
}
.field input:focus, .field select:focus, .field textarea:focus{
  outline:none; border-color:var(--accent); box-shadow:0 0 0 3.5px var(--accent-soft); background:rgba(var(--surface-rgb),.75);
}
.field textarea{min-height:92px; resize:vertical; font-family:var(--font-body); line-height:1.55;}
.row{display:flex; gap:10px;}
.row > .field{flex:1;}

.toggle-row{display:flex; gap:8px; flex-wrap:wrap;}
.toggle{
  flex:1; min-width:68px; text-align:center; padding:10px 6px; border-radius:11px;
  border:1px solid var(--border-soft); background:var(--surface-2); font-size:12.5px; cursor:pointer;
  color:var(--text-muted); transition:all var(--dur) var(--ease); min-height:48px;
}
.toggle.yes.on{background:var(--good-soft); border-color:var(--good); color:var(--good); font-weight:700;}
.toggle.no.on{background:var(--bad-soft); border-color:var(--bad); color:var(--bad); font-weight:700;}

.vice-grid{display:grid; grid-template-columns:1fr 1fr; gap:9px;}
.vice-item{background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:10px 11px; transition:border-color var(--dur) var(--ease);}
.vice-item .name{font-size:12.5px; margin-bottom:7px; font-weight:600;}
.vice-toggle{display:flex; gap:6px;}
.vice-toggle button{flex:1; padding:7px 0; border-radius:8px; border:1px solid var(--border); background:var(--bg-soft); font-size:11px; color:var(--text-muted); cursor:pointer; min-height:32px;}
.vice-toggle button.on-yes{background:var(--good-soft); border-color:var(--good); color:var(--good); font-weight:700;}
.vice-toggle button.on-no{background:var(--bad-soft); border-color:var(--bad); color:var(--bad); font-weight:700;}

/* date nav */
.datenav{display:flex; align-items:center; gap:10px; margin-bottom:15px;}
.datenav .icon-btn{width:40px;height:40px;}
.datenav .cur{flex:1; text-align:center;}
.datenav .cur .d{font-family:var(--font-display); font-size:17px; color:var(--text-on-bg);}
.datenav .cur .w{font-size:11px; color:var(--text-on-bg-muted); margin-top:1px;}

/* table */
table.simple{width:100%; border-collapse:collapse; font-size:13px;}
table.simple th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); padding:8px 5px; border-bottom:1px solid var(--border); font-weight:700;}
table.simple td{padding:9px 5px; border-bottom:1px solid var(--border);}
table.simple tr:last-child td{border-bottom:none;}
table.simple tr{transition:background var(--dur) var(--ease);}
@media (hover:hover){ table.simple tr:hover{background:rgba(var(--surface-rgb),.4);} }
.right{text-align:right;}
.center{text-align:center;}

.pill{display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:.01em;}
.pill.good{background:var(--good-soft); color:var(--good);}
.pill.bad{background:var(--bad-soft); color:var(--bad);}
.pill.neutral{background:var(--surface-2); color:var(--text-muted);}

/* heatmap */
.heatgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.heatgrid .dow{font-size:10px; color:var(--text-muted); text-align:center; padding-bottom:3px; font-weight:700;}
.heatcell{aspect-ratio:1; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:10.5px; font-family:var(--font-mono); border:1px solid var(--border); transition:transform var(--dur-fast) var(--ease);}
.heatcell.empty{border:none; background:transparent;}
.heatcell.h0{background:var(--surface-2); color:var(--text-muted);}
.heatcell.h1{background:rgba(63,107,244,.25); color:var(--text);}
.heatcell.h2{background:rgba(63,107,244,.5); color:var(--text);}
.heatcell.h3{background:rgba(63,107,244,.85); color:var(--on-accent); font-weight:700;}
.heatcell.today{outline:2px solid var(--accent-3); outline-offset:1px; box-shadow:0 0 9px rgba(63,107,244,.55);}

/* bar chart (css only) */
.barchart{display:flex; align-items:flex-end; gap:7px; height:126px; padding-top:10px;}
.barchart .bar{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;}
.barchart .bar .fill{width:100%; background:var(--accent-grad); border-radius:7px 7px 2px 2px; min-height:2px; box-shadow:0 -2px 9px rgba(63,107,244,.4); transition:height .5s var(--ease-spring);}
.barchart .bar .lbl{font-size:9.5px; color:var(--text-muted); margin-top:5px;}

.subtabs{display:flex; gap:7px; margin-bottom:17px; overflow-x:auto; padding-bottom:3px; scrollbar-width:none;}
.subtabs::-webkit-scrollbar{display:none;}
.subtabs button{
  flex:0 0 auto; padding:9px 15px; border-radius:20px; border:1px solid var(--border-soft);
  background:rgba(var(--surface-rgb),.6); color:var(--text-muted); font-size:12.5px; cursor:pointer; white-space:nowrap;
  transition:all var(--dur) var(--ease); min-height:40px;
}
.subtabs button.active{background:var(--accent-grad); color:var(--on-accent); border-color:var(--accent); font-weight:700; box-shadow:var(--shadow-glow);}

.empty-note{color:var(--text-muted); font-size:13px; padding:14px 2px; text-align:center; line-height:1.6;}
main > .empty-note{color:var(--text-on-bg-muted);}
.divider{height:1px; background:var(--border); margin:14px 0;}
.rule-list{list-style:none; margin:0; padding:0;}
.rule-list li{display:flex; align-items:center; gap:9px; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px;}
.rule-list li:last-child{border-bottom:none;}
.rule-list li .idx{width:20px; color:var(--text-faint); font-family:var(--font-mono); font-size:12px;}
.rule-list li input{flex:1; background:none; border:none; font-size:14px; color:var(--text); padding:4px 0; min-height:32px;}
.rule-list li input:focus{outline:none; border-bottom:1.5px solid var(--accent);}
.rule-list li button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:4px 8px; border-radius:8px; min-height:32px;}
.rule-list li button:active{background:var(--bad-soft); color:var(--bad);}

/* toast */
.toast{
  position:fixed; left:50%; bottom:calc(96px + env(safe-area-inset-bottom)); transform:translate(-50%,24px);
  background:rgba(var(--surface-rgb),.92); backdrop-filter:blur(16px) saturate(1.3); -webkit-backdrop-filter:blur(16px) saturate(1.3);
  border:1px solid var(--border-soft); color:var(--text);
  padding:11px 20px; border-radius:30px; font-size:13px; z-index:60; font-weight:500;
  opacity:0; transition:all .35s var(--ease-spring); pointer-events:none; box-shadow:var(--shadow-3);
  display:flex; align-items:center; gap:8px; max-width:88vw;
}
.toast.show{opacity:1; transform:translate(-50%,0);}
.toast::before{content:"✓"; display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; border-radius:50%; background:var(--good); color:#fff; font-size:10px; flex:0 0 auto;}

.milestone-item{display:flex; align-items:center; gap:11px; padding:11px 0; border-bottom:1px solid var(--border);}
.milestone-item:last-child{border-bottom:none;}
.milestone-item .mi-num{width:28px; height:28px; border-radius:50%; background:var(--surface-2); display:flex; align-items:center; justify-content:center; font-size:11px; font-family:var(--font-mono); flex:0 0 auto; border:1px solid var(--border);}
.milestone-item.achieved .mi-num{background:var(--accent-grad); color:var(--on-accent); font-weight:700; box-shadow:0 2px 10px rgba(63,107,244,.4); border:none;}
.milestone-item .mi-body{flex:1; min-width:0;}
.milestone-item .mi-target{font-family:var(--font-mono); font-size:13.5px; font-weight:600;}
.milestone-item .mi-meta{font-size:11px; color:var(--text-muted); margin-top:2px;}

.settings-group{margin-bottom:22px;}
.settings-group h3{font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); margin:0 0 12px; font-weight:700;}

/* ============================================================
   MODAL (custom confirm dialogs — replaces window.confirm)
   ============================================================ */
.modal-backdrop{
  position:fixed; inset:0; z-index:70; background:rgba(2,5,15,.6); backdrop-filter:blur(4px);
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity var(--dur) var(--ease);
}
.modal-backdrop.open{opacity:1; pointer-events:auto;}
@media (min-width:520px){ .modal-backdrop{align-items:center;} }
.modal-sheet{
  width:100%; max-width:420px; background:rgba(var(--surface-rgb),.97); backdrop-filter:blur(24px);
  border:1px solid var(--border-soft); border-radius:22px 22px 0 0; padding:22px 20px calc(20px + env(safe-area-inset-bottom));
  box-shadow:var(--shadow-3); transform:translateY(20px); transition:transform var(--dur-slow) var(--ease-spring);
}
@media (min-width:520px){ .modal-sheet{border-radius:20px; margin-bottom:0;} }
.modal-backdrop.open .modal-sheet{transform:translateY(0);}
.modal-sheet h3{font-family:var(--font-display); font-size:18px; margin-bottom:8px;}
.modal-sheet p{font-size:13.5px; color:var(--text-muted); line-height:1.6; margin:0 0 18px;}
.modal-actions{display:flex; gap:10px;}
.modal-actions .btn{flex:1;}

/* ============================================================
   SCROLLBAR / MISC
   ============================================================ */
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:20px;}
::-webkit-scrollbar-thumb:hover{background:var(--accent);}

@media print{
  .topbar,.bottomnav,.drawer,.drawer-backdrop,.subtabs,.no-print,.modal-backdrop,.toast{display:none !important;}
  body{padding-bottom:0; background:#fff; color:#111;}
  .card{border:1px solid #ccc; background:#fff; box-shadow:none;}
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
}
@media (max-width:359px){
  .mala-wrap{flex-direction:column; align-items:flex-start;}
}
</style>

<script>
"use strict";
/* ============================================================
   SADHANA — offline japa & discipline tracker
   Single-file app. All data stored locally on this device
   (localStorage) plus JSON export/import for backup.
   ============================================================ */

/* ---------------- constants ---------------- */
const VICE_KEYS = ["kaam","krodh","aham","lobh","moh","irsha","dwesh","ninda","pravachan"];
const VICE_LABELS = {kaam:"Kaam",krodh:"Krodh",aham:"Aham",lobh:"Lobh",moh:"Moh",irsha:"Irsha",dwesh:"Dwesh",ninda:"Ninda",pravachan:"Pravachan"};
const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

const DEFAULT_SETTINGS = {
  startDate: toISO(new Date()),
  dailyTarget: 16,
  lifetimeTarget: 100000000,
  theme: "dark",
  milestones: [100000,500000,1000000,2000000,5000000,10000000,20000000,30000000,40000000,50000000,60000000,70000000,80000000,90000000,100000000,120000000,140000000,160000000,180000000,200000000]
};
const DEFAULT_RULES = {
  mm: ["Kaam","Krodh","Aham","Ninda","Pravachan","Dosh","Apmaan (Tinka)"],
  sm: ["Aham","Ichha","Asha","Trishna","Shakti","Samman","Moh","Vyakti","Pad","Sthan","Lobh","Dhan","Vastu","Anukulta","Raag","Sharir","Sansar","Hasi","Jagat Preeti","Bahut Baat"],
  hk: ["Alasya","Pramaad"],
  mantra: "Hare Krishna Hare Krishna Krishna Krishna Hare Hare / Hare Rama Hare Rama Rama Rama Hare Hare"
};
const DEFAULT_NOTES = {page1:"", page2:"", page3:""};

/* ---------------- date helpers ---------------- */
function toISO(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${day}`; }
function parseISO(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y, m-1, d); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function todayDate(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function todayISO(){ return toISO(todayDate()); }
function fmtLong(d){ return d.toLocaleDateString(undefined,{weekday:"short", day:"2-digit", month:"short", year:"numeric"}); }
function fmtShort(d){ return d.toLocaleDateString(undefined,{day:"2-digit", month:"short"}); }
function fmtMonthYear(d){ return `${MONTHS[d.getMonth()]} ${d.getFullYear()}`; }
function eomonth(d){ return new Date(d.getFullYear(), d.getMonth()+1, 0); }
function clamp(n,lo,hi){ return Math.max(lo, Math.min(hi, n)); }
function pct(n){ return (n*100).toFixed(1)+"%"; }
function numFmt(n){ if(n===null||n===undefined||isNaN(n)) return "—"; return Math.round(n).toLocaleString(); }
function safeDiv(a,b){ return b? a/b : 0; }

/* ---------------- storage ---------------- */
const Store = {
  load(key, fallback){
    try{ const raw = localStorage.getItem(key); if(!raw) return structuredCloneSafe(fallback); return JSON.parse(raw); }
    catch(e){ return structuredCloneSafe(fallback); }
  },
  save(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); return true; }catch(e){ return false; } }
};
function structuredCloneSafe(v){ return JSON.parse(JSON.stringify(v)); }

let settings = Object.assign({}, DEFAULT_SETTINGS, Store.load("sadhana.settings", DEFAULT_SETTINGS));
let entries = Store.load("sadhana.entries", {});
let rules = Object.assign({}, DEFAULT_RULES, Store.load("sadhana.rules", DEFAULT_RULES));
let notes = Object.assign({}, DEFAULT_NOTES, Store.load("sadhana.notes", DEFAULT_NOTES));

function persistSettings(){ Store.save("sadhana.settings", settings); }
function persistEntries(){ Store.save("sadhana.entries", entries); }
function persistRules(){ Store.save("sadhana.rules", rules); }
function persistNotes(){ Store.save("sadhana.notes", notes); }

function getEntry(dateKey){
  return entries[dateKey] || {japa:0, mm:"", sm:"", hk:"", wake:"", sleep:"", exercise:"", muscleGrp:"", duration:"", screen:"", notes:"",
    kaam:"", krodh:"", aham:"", lobh:"", moh:"", irsha:"", dwesh:"", ninda:"", pravachan:""};
}

/* ---------------- computed series (mirrors Daily Entry sheet's running formulas) ---------------- */
let _seriesCache = null;
let _seriesCacheKey = null;
function computeSeries(){
  const cacheKey = settings.startDate + "|" + JSON.stringify(Object.keys(entries).length) + "|" + todayISO();
  if(_seriesCache && _seriesCacheKey===cacheKey) return _seriesCache;

  const start = parseISO(settings.startDate);
  let end = todayDate();
  for(const k in entries){ const d = parseISO(k); if(d>end) end = d; }

  const days = [];
  let cum = 0, streak = 0, perfectStreak = 0;
  const viceStreak = {}; VICE_KEYS.forEach(v=>viceStreak[v]=0);
  const viceLongest = {}; VICE_KEYS.forEach(v=>viceLongest[v]=0);
  let longestStreak = 0, longestPerfectStreak = 0;

  for(let d=new Date(start); d<=end; d=addDays(d,1)){
    const key = toISO(d);
    const e = entries[key];
    const japa = e ? (Number(e.japa)||0) : 0;
    cum += japa;
    const active = japa>0 ? 1 : 0;
    streak = active ? streak+1 : 0;
    if(streak>longestStreak) longestStreak = streak;

    let yesCount = 0, noCount = 0, perfectCount = 0;
    const viceVals = {};
    VICE_KEYS.forEach(v=>{
      const val = e ? (e[v]||"") : "";
      viceVals[v] = val;
      if(val==="Yes"){ viceStreak[v]+=1; perfectCount++; yesCount++; }
      else { viceStreak[v]=0; if(val==="No") noCount++; }
      if(viceStreak[v]>viceLongest[v]) viceLongest[v]=viceStreak[v];
    });
    const perfect = perfectCount===VICE_KEYS.length ? 1 : 0;
    perfectStreak = perfect ? perfectStreak+1 : 0;
    if(perfectStreak>longestPerfectStreak) longestPerfectStreak = perfectStreak;

    days.push({
      date:key, dateObj:new Date(d), japa,
      achv: safeDiv(japa, settings.dailyTarget),
      active, cum, streak,
      viceVals, viceStreakSnapshot:Object.assign({},viceStreak),
      perfect, perfectStreak,
      mm:e?e.mm||"":"", sm:e?e.sm||"":"", hk:e?e.hk||"":"",
      hasEntry: !!e
    });
  }
  const byDate = {}; days.forEach(d=>byDate[d.date]=d);
  _seriesCache = {days, byDate, start, end, longestStreak, viceLongest, longestPerfectStreak};
  _seriesCacheKey = cacheKey;
  return _seriesCache;
}
function invalidateSeries(){ _seriesCache=null; }

function milestoneStatus(series){
  const cum = series.days.length ? series.days[series.days.length-1].cum : 0;
  const list = settings.milestones.slice().sort((a,b)=>a-b);
  let achievedCount = 0;
  for(const m of list){ if(cum>=m) achievedCount++; }
  const next = list.find(m=>m>cum);
  const latest = list.filter(m=>m<=cum).pop();
  return {cum, list, achievedCount, next, latest};
}

/* ---------------- toast ---------------- */
let toastTimer = null;
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 2200);
}

/* ---------------- router ---------------- */
let currentPage = "dashboard";
let entryDate = todayISO();
let analysisTab = "weekly";
let analysisWeekEnd = todayISO();
let analysisMonth = todayISO();
let analysisYear = new Date().getFullYear();
let reportsTab = "monthly";
let motivationPage = "page1";

const PAGES = {
  dashboard: renderDashboard,
  entry: renderEntry,
  analysis: renderAnalysis,
  discipline: renderDiscipline,
  milestones: renderMilestones,
  reports: renderReports,
  rules: renderRules,
  motivation: renderMotivation,
  settings: renderSettings
};

function navigate(page){
  currentPage = page;
  document.querySelectorAll(".drawer .nav-item").forEach(b=>b.classList.toggle("active", b.dataset.page===page));
  document.querySelectorAll(".bottomnav button").forEach(b=>b.classList.toggle("active", b.dataset.page===page));
  closeDrawer();
  render();
  updateNavIndicator();
  window.scrollTo(0,0);
}
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";
  (PAGES[currentPage] || renderDashboard)(app);
  updateTopbarMeta();
}

function openDrawer(){ document.getElementById("drawer").classList.add("open"); document.getElementById("drawerBackdrop").classList.add("open"); }
function closeDrawer(){ document.getElementById("drawer").classList.remove("open"); document.getElementById("drawerBackdrop").classList.remove("open"); }

document.getElementById("menuBtn").addEventListener("click", openDrawer);
document.getElementById("drawerBackdrop").addEventListener("click", closeDrawer);
const drawerCloseBtnEl = document.getElementById("drawerCloseBtn");
if(drawerCloseBtnEl) drawerCloseBtnEl.addEventListener("click", closeDrawer);
document.querySelectorAll(".drawer .nav-item, .bottomnav button").forEach(b=>{
  b.addEventListener("click", ()=>navigate(b.dataset.page));
});

/* ---------------- topbar meta: greeting + date + streak (display only) ---------------- */
function updateTopbarMeta(){
  const dateEl = document.getElementById("topbarDate");
  if(!dateEl) return;
  const hour = new Date().getHours();
  const greeting = hour<12 ? "Good morning" : hour<17 ? "Good afternoon" : "Good evening";
  let streakChip = "";
  try{
    const series = computeSeries();
    const today = series.byDate[todayISO()];
    const streak = today ? today.streak : 0;
    if(streak>0) streakChip = `<span class="streak-chip">🔥 ${streak}</span>`;
  }catch(e){ /* non-fatal display enhancement */ }
  dateEl.innerHTML = `${greeting} · ${fmtLong(todayDate())} ${streakChip}`;
}

/* ---------------- bottom nav sliding indicator (display only) ---------------- */
function updateNavIndicator(){
  const indicator = document.getElementById("navIndicator");
  const wrap = document.getElementById("bottomnavInner");
  if(!indicator || !wrap) return;
  const activeBtn = wrap.querySelector(`button[data-page="${currentPage}"]`);
  if(!activeBtn){ indicator.style.opacity = "0"; return; }
  indicator.style.opacity = "1";
  indicator.style.left = activeBtn.offsetLeft + "px";
  indicator.style.width = activeBtn.offsetWidth + "px";
}
window.addEventListener("resize", ()=>updateNavIndicator());

/* ---------------- ripple micro-interaction (visual only, no logic change) ---------------- */
document.addEventListener("pointerdown", ev=>{
  const target = ev.target.closest(".btn, .icon-btn, .subtabs button, .bottomnav button, .toggle, .vice-toggle button, .nav-item");
  if(!target) return;
  const rect = target.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 1.4;
  const span = document.createElement("span");
  span.className = "ripple";
  span.style.width = span.style.height = size + "px";
  span.style.left = (ev.clientX - rect.left - size/2) + "px";
  span.style.top = (ev.clientY - rect.top - size/2) + "px";
  if(getComputedStyle(target).position === "static") target.style.position = "relative";
  if(getComputedStyle(target).overflow === "visible") target.style.overflow = "hidden";
  target.appendChild(span);
  setTimeout(()=>span.remove(), 600);
});

/* ---------------- custom modal (replaces window.confirm for a native-app feel) ---------------- */
function showModal({title, body, confirmLabel="Confirm", cancelLabel="Cancel", danger=false}){
  return new Promise(resolve=>{
    const backdrop = document.getElementById("modalBackdrop");
    const sheet = document.getElementById("modalSheet");
    sheet.innerHTML = `<h3>${title}</h3><p>${body}</p><div class="modal-actions">
      <button class="btn secondary block" id="modalCancel">${cancelLabel}</button>
      <button class="btn ${danger?'danger':''} block" id="modalConfirm">${confirmLabel}</button>
    </div>`;
    function cleanup(result){
      backdrop.classList.remove("open");
      backdrop.removeEventListener("click", onBackdropClick);
      resolve(result);
    }
    function onBackdropClick(ev){ if(ev.target===backdrop) cleanup(false); }
    sheet.querySelector("#modalCancel").addEventListener("click", ()=>cleanup(false));
    sheet.querySelector("#modalConfirm").addEventListener("click", ()=>cleanup(true));
    backdrop.addEventListener("click", onBackdropClick);
    backdrop.classList.add("open");
  });
}

function malaRingSVG(total, filled){
  const R = 58, cx=66, cy=66;
  let dots = "";
  for(let i=0;i<total;i++){
    const angle = (i/total)*Math.PI*2 - Math.PI/2;
    const x = cx + R*Math.cos(angle), y = cy + R*Math.sin(angle);
    const on = i<filled;
    dots += `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${total>20?3.6:5.2}" fill="${on?"var(--accent)":"var(--surface-2)"}" stroke="${on?"var(--accent-2)":"var(--border)"}" stroke-width="1"/>`;
  }
  return `<svg viewBox="0 0 132 132">${dots}</svg>`;
}

function renderWeeklyAnalysis(app, series){
  const wrap = el(`<div class="field"><label>Week ending</label><input type="date" id="weekEnd" value="${analysisWeekEnd}"></div>`);
  app.appendChild(wrap);
  wrap.querySelector("#weekEnd").addEventListener("change", ev=>{ analysisWeekEnd = ev.target.value||todayISO(); render(); });

  const end = parseISO(analysisWeekEnd);
  const start = addDays(end,-6);
  const prevStart = addDays(start,-7), prevEnd = addDays(end,-7);
  const inRange = (d,s,e2)=> d>=s && d<=e2;
  const weekDays = series.days.filter(d=>inRange(d.dateObj, start, end));
  const prevDays = series.days.filter(d=>inRange(d.dateObj, prevStart, prevEnd));
  const total = weekDays.reduce((s,d)=>s+d.japa,0);
  const prevTotal = prevDays.reduce((s,d)=>s+d.japa,0);
  const avg = safeDiv(total,7);
  const achv = safeDiv(total, settings.dailyTarget*7);
  const trend = total>prevTotal?"Improving":total<prevTotal?"Declining":"Steady";
  const mmComp = safeDiv(weekDays.filter(d=>d.mm==="Yes").length,7);
  const smhkComp = safeDiv(weekDays.filter(d=>d.sm==="Yes"&&d.hk==="Yes").length,7);

  app.appendChild(el(`
    <div class="grid3">
      <div class="card tight"><div class="stat-label">Weekly Total</div><div class="stat-value">${numFmt(total)}</div></div>
      <div class="card tight"><div class="stat-label">Weekly Avg</div><div class="stat-value">${avg.toFixed(1)}</div></div>
      <div class="card tight"><div class="stat-label">Achv %</div><div class="stat-value">${pct(achv)}</div></div>
    </div>
    <div class="grid2">
      <div class="card tight"><div class="stat-label">Trend vs prior week</div><div class="stat-value" style="font-size:15px;">
        <span class="pill ${trend==='Improving'?'good':trend==='Declining'?'bad':'neutral'}">${trend}</span></div></div>
      <div class="card tight"><div class="stat-label">MM / SM+HK compliance</div><div class="stat-value" style="font-size:15px;">${pct(mmComp)} · ${pct(smhkComp)}</div></div>
    </div>
  `));

  app.appendChild(el(`<div class="section-title">Daily comparison<div class="rule"></div></div>`));
  const tbl = el(`<div class="card tight"><table class="simple"><thead><tr><th>Date</th><th class="right">Japa</th><th class="right">Achv %</th></tr></thead><tbody></tbody></table></div>`);
  const tbody = tbl.querySelector("tbody");
  for(let d=new Date(start); d<=end; d=addDays(d,1)){
    const key = toISO(d); const rec = series.byDate[key];
    tbody.appendChild(el(`<tr><td>${fmtShort(d)}</td><td class="right num">${rec?numFmt(rec.japa):"0"}</td><td class="right num">${rec?pct(rec.achv):"0.0%"}</td></tr>`));

function renderMonthlyAnalysis(app, series){
  const wrap = el(`<div class="field"><label>Month</label><input type="date" id="monthPick" value="${analysisMonth}"></div>`);
  app.appendChild(wrap);
  wrap.querySelector("#monthPick").addEventListener("change", ev=>{ analysisMonth = ev.target.value||todayISO(); render(); });

  const anchor = parseISO(analysisMonth);
  const monthStart = new Date(anchor.getFullYear(), anchor.getMonth(), 1);
  const monthEnd = eomonth(anchor);
  const monthDays = series.days.filter(d=>d.dateObj>=monthStart && d.dateObj<=monthEnd);
  const total = monthDays.reduce((s,d)=>s+d.japa,0);
  const daysInMonth = monthEnd.getDate();
  const avgPerDay = safeDiv(total, daysInMonth);
  const achv = safeDiv(total, settings.dailyTarget*daysInMonth);
  const activeMonthDays = monthDays.filter(d=>d.japa>0);
  let bestDay=null, lowestDay=null;
  activeMonthDays.forEach(d=>{ if(!bestDay||d.japa>bestDay.japa) bestDay=d; if(!lowestDay||d.japa<lowestDay.japa) lowestDay=d; });
  const perfectDays = monthDays.filter(d=>d.perfect).length;

  app.appendChild(el(`
    <div class="grid3">
      <div class="card tight"><div class="stat-label">Monthly Total</div><div class="stat-value">${numFmt(total)}</div></div>
      <div class="card tight"><div class="stat-label">Avg / Day</div><div class="stat-value">${avgPerDay.toFixed(1)}</div></div>
      <div class="card tight"><div class="stat-label">Achv %</div><div class="stat-value">${pct(achv)}</div></div>
    </div>
    <div class="grid3">
      <div class="card tight"><div class="stat-label">Best Day</div><div class="stat-value" style="font-size:13.5px;">${bestDay?fmtShort(bestDay.dateObj)+" ("+numFmt(bestDay.japa)+")":"N/A"}</div></div>
      <div class="card tight"><div class="stat-label">Lowest Active Day</div><div class="stat-value" style="font-size:13.5px;">${lowestDay?fmtShort(lowestDay.dateObj)+" ("+numFmt(lowestDay.japa)+")":"N/A"}</div></div>
      <div class="card tight"><div class="stat-label">Perfect Days</div><div class="stat-value">${perfectDays}</div></div>
    </div>
  `));

  app.appendChild(el(`<div class="section-title">Calendar heat map<div class="rule"></div></div>`));
  const heatCard = el(`<div class="card tight"></div>`);
  const grid = el(`<div class="heatgrid"></div>`);
  DOW.forEach(d=>grid.appendChild(el(`<div class="dow">${d}</div>`)));
  const firstDow = monthStart.getDay();
  for(let i=0;i<firstDow;i++) grid.appendChild(el(`<div class="heatcell empty"></div>`));
  for(let day=1; day<=daysInMonth; day++){
    const d = new Date(anchor.getFullYear(), anchor.getMonth(), day);
    const key = toISO(d);
    const rec = series.byDate[key];
    const a = rec ? rec.achv : 0;
    let cls = "h0";
    if(a>=1) cls="h3"; else if(a>=0.5) cls="h2"; else if(a>0) cls="h1";
    const isToday = key===todayISO();
    grid.appendChild(el(`<div class="heatcell ${cls} ${isToday?'today':''}" title="${key}: ${rec?numFmt(rec.japa):0}">${day}</div>`));
  }
  heatCard.appendChild(grid);
  app.appendChild(heatCard);

  app.appendChild(el(`<div class="section-title">Weekly totals (within month)<div class="rule"></div></div>`));
  const wtbl = el(`<div class="card tight"><table class="simple"><thead><tr><th>Week</th><th class="right">Total Japa</th></tr></thead><tbody></tbody></table></div>`);
  const wtbody = wtbl.querySelector("tbody");
  for(let w=0; w<5; w++){
    const wStart = addDays(monthStart, w*7);
    if(wStart>monthEnd) break;
    const wEnd = new Date(Math.min(addDays(wStart,6).getTime(), monthEnd.getTime()));
    const wTotal = monthDays.filter(d=>d.dateObj>=wStart && d.dateObj<=wEnd).reduce((s,d)=>s+d.japa,0);
    wtbody.appendChild(el(`<tr><td>Week ${w+1}</td><td class="right num">${numFmt(wTotal)}</td></tr>`));
  }
  app.appendChild(wtbl);

  const mmYes = monthDays.filter(d=>d.mm==="Yes").length;
  const smYes = monthDays.filter(d=>d.sm==="Yes").length;
  const hkYes = monthDays.filter(d=>d.hk==="Yes").length;
  const activeCount = monthDays.filter(d=>d.active).length;
  app.appendChild(el(`<div class="section-title">Auto-generated summary<div class="rule"></div></div>`));
  app.appendChild(el(`<div class="card">
    <div style="font-size:13.5px; line-height:1.9;">
      Japa target achieved: <b class="num">${activeCount}</b>/${daysInMonth} days<br>
      MM success: <b class="num">${pct(safeDiv(mmYes,daysInMonth))}</b><br>
      SM success: <b class="num">${pct(safeDiv(smYes,daysInMonth))}</b><br>
      HK success: <b class="num">${pct(safeDiv(hkYes,daysInMonth))}</b><br>
      Perfect days: <b class="num">${perfectDays}</b><br>
      Monthly achievement: <b class="num">${pct(achv)}</b>
    </div>
  </div>`));
}

function renderYearlyAnalysis(app, series){
  const wrap = el(`<div class="field"><label>Year</label><input type="number" id="yearPick" value="${analysisYear}"></div>`);
  app.appendChild(wrap);
  wrap.querySelector("#yearPick").addEventListener("change", ev=>{ analysisYear = Number(ev.target.value)||new Date().getFullYear(); render(); });

  const yearDays = series.days.filter(d=>d.dateObj.getFullYear()===analysisYear);
  const total = yearDays.reduce((s,d)=>s+d.japa,0);
  const activeDays = yearDays.filter(d=>d.active).length;
  const daysCount = yearDays.length || 1;
  const avgPerDay = safeDiv(total, daysCount);
  const monthlyAvg = safeDiv(total, 12);
  const achv = safeDiv(total, settings.dailyTarget*daysCount);

  const yStart = new Date(analysisYear,0,1), yEnd = new Date(analysisYear,11,31);
  const cumAtStart = series.byDate[toISO(addDays(yStart,-1))]?.cum || 0;
  const cumAtEnd = yearDays.length ? yearDays[yearDays.length-1].cum : cumAtStart;
  const list = settings.milestones;
  const msThisYear = list.filter(m=>m>cumAtStart && m<=cumAtEnd).length;

  app.appendChild(el(`
    <div class="grid3">
      <div class="card tight"><div class="stat-label">Year Total</div><div class="stat-value">${numFmt(total)}</div></div>
      <div class="card tight"><div class="stat-label">Monthly Avg</div><div class="stat-value">${monthlyAvg.toFixed(1)}</div></div>
      <div class="card tight"><div class="stat-label">Active Days</div><div class="stat-value">${activeDays}</div></div>
    </div>
    <div class="grid3">
      <div class="card tight"><div class="stat-label">Avg / Day</div><div class="stat-value">${avgPerDay.toFixed(1)}</div></div>
      <div class="card tight"><div class="stat-label">Achv %</div><div class="stat-value">${pct(achv)}</div></div>
      <div class="card tight"><div class="stat-label">Milestones (yr)</div><div class="stat-value">${msThisYear}</div></div>
    </div>
  `));

  app.appendChild(el(`<div class="section-title">Jan – Dec comparison<div class="rule"></div></div>`));
  const monthlyTotals = MONTHS.map((name,i)=>{
    const mStart = new Date(analysisYear,i,1), mEnd = eomonth(mStart);
    const t = yearDays.filter(d=>d.dateObj>=mStart && d.dateObj<=mEnd).reduce((s,d)=>s+d.japa,0);
    return {name, t};
  });
  const maxT = Math.max(1, ...monthlyTotals.map(m=>m.t));
  const chart = el(`<div class="card"><div class="barchart"></div></div>`);
  const bc = chart.querySelector(".barchart");
  monthlyTotals.forEach(m=>{
    bc.appendChild(el(`<div class="bar"><div class="fill" style="height:${clamp(m.t/maxT*100,1,100)}%"></div><div class="lbl">${m.name.slice(0,3)}</div></div>`));
  });
  app.appendChild(chart);

  let best=monthlyTotals[0], low=monthlyTotals[0];
  monthlyTotals.forEach(m=>{ if(m.t>best.t) best=m; if(m.t<low.t) low=m; });
  app.appendChild(el(`
    <div class="grid2">
      <div class="card tight"><div class="stat-label">Best Month</div><div class="stat-value" style="font-size:14px;">${best.name} (${numFmt(best.t)})</div></div>
      <div class="card tight"><div class="stat-label">Lowest Month</div><div class="stat-value" style="font-size:14px;">${low.name} (${numFmt(low.t)})</div></div>
    </div>
  `));
}

function renderDiscipline(app){
  app.appendChild(el(`<div class="page-title"><h1>Discipline</h1><p>Long-term consistency tracking — fully automatic.</p></div>`));
  const series = computeSeries();
  const today = series.byDate[todayISO()];
  const last30 = new Date(); last30.setDate(last30.getDate()-30);
  const prior30start = new Date(); prior30start.setDate(prior30start.getDate()-60);
  const prior30end = new Date(); prior30end.setDate(prior30end.getDate()-30);

  const tbl = el(`<div class="card tight"><table class="simple">
    <thead><tr><th>Discipline</th><th class="right">Streak</th><th class="right">Best</th><th class="right">Rate</th><th class="right">Trend</th></tr></thead>
    <tbody></tbody></table></div>`);
  const tbody = tbl.querySelector("tbody");
  VICE_KEYS.forEach(v=>{
    const curStreak = today ? today.viceStreakSnapshot[v] : 0;
    const longest = series.viceLongest[v]||0;
    const yes = series.days.filter(d=>d.viceVals[v]==="Yes").length;
    const no = series.days.filter(d=>d.viceVals[v]==="No").length;
    const rate = safeDiv(yes, yes+no);
    const recent = series.days.filter(d=>d.dateObj>last30 && d.dateObj<=todayDate());
    const prior = series.days.filter(d=>d.dateObj>prior30start && d.dateObj<=prior30end);
    const recentRate = safeDiv(recent.filter(d=>d.viceVals[v]==="Yes").length, 30);
    const priorRate = safeDiv(prior.filter(d=>d.viceVals[v]==="Yes").length, 30);
    const trend = recentRate>priorRate?"Improving":recentRate<priorRate?"Declining":"Steady";
    tbody.appendChild(el(`<tr>
      <td>${VICE_LABELS[v]}</td>
      <td class="right num">${curStreak}</td>
      <td class="right num">${longest}</td>
      <td class="right num">${pct(rate)}</td>
      <td class="right"><span class="pill ${trend==='Improving'?'good':trend==='Declining'?'bad':'neutral'}" style="font-size:10px;">${trend}</span></td>
    </tr>`));
  });
  app.appendChild(tbl);

  const perfectDays = series.days.filter(d=>d.perfect).length;
  const activeDays = series.days.filter(d=>d.active).length;
  const overallRate = safeDiv(perfectDays, activeDays||1);
  const curPerfectStreak = today ? today.perfectStreak : 0;

  app.appendChild(el(`<div class="section-title">Perfect discipline<div class="rule"></div></div>`));
  app.appendChild(el(`
    <div class="grid3">
      <div class="card tight"><div class="stat-label">Perfect Days</div><div class="stat-value">${perfectDays}</div></div>
      <div class="card tight"><div class="stat-label">Success Rate</div><div class="stat-value">${pct(overallRate)}</div></div>
      <div class="card tight"><div class="stat-label">Current Streak</div><div class="stat-value">${curPerfectStreak}</div></div>
    </div>
  `));
}

function renderMilestones(app){

  app.appendChild(el(`

    list.appendChild(el(`

}

    <div class="stat-sub" style="margin-bottom:12px;">All data is stored only on this device. Export a backup regularly, especially before clearing browser data.</div>
    <div class="row">
      <button class="btn secondary block" id="exportBtn">Export backup (.json)</button>
    </div>
    <div class="row" style="margin-top:10px;">
      <button class="btn secondary block" id="importBtn">Import backup</button>
      <input type="file" id="importFile" accept="application/json" style="display:none;">
    </div>
    <div class="row" style="margin-top:10px;">
      <button class="btn danger block" id="resetBtn">Reset all data</button>
    </div>
  </div>`);
  app.appendChild(dataCard);
  dataCard.querySelector("#exportBtn").addEventListener("click", exportBackup);
  dataCard.querySelector("#importBtn").addEventListener("click", ()=>dataCard.querySelector("#importFile").click());
  dataCard.querySelector("#importFile").addEventListener("change", importBackup);
  dataCard.querySelector("#resetBtn").addEventListener("click", async ()=>{
    const step1 = await showModal({
      title:"Reset all data?",
      body:"This will permanently delete all entries, settings and notes on this device. Continue?",
      confirmLabel:"Continue", cancelLabel:"Cancel", danger:true
    });
    if(!step1) return;
    const step2 = await showModal({
      title:"Are you absolutely sure?",
      body:"This cannot be undone. Consider exporting a backup first.",
      confirmLabel:"Delete everything", cancelLabel:"Cancel", danger:true
    });
    if(!step2) return;
    localStorage.removeItem("sadhana.settings");
    localStorage.removeItem("sadhana.entries");
    localStorage.removeItem("sadhana.rules");
    localStorage.removeItem("sadhana.notes");
    location.reload();
  });

  app.appendChild(el(`<div class="empty-note" style="text-align:center;margin-top:10px;">Sadhana · offline personal practice tracker</div>`));
}

function exportBackup(){
  const payload = {settings, entries, rules, notes, exportedAt:new Date().toISOString(), version:1};
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `sadhana-backup-${todayISO()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  toast("Backup downloaded");
}
function importBackup(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(data.settings) settings = Object.assign({}, DEFAULT_SETTINGS, data.settings);
      if(data.entries) entries = data.entries;
      if(data.rules) rules = Object.assign({}, DEFAULT_RULES, data.rules);
      if(data.notes) notes = Object.assign({}, DEFAULT_NOTES, data.notes);
      persistSettings(); persistEntries(); persistRules(); persistNotes();
      invalidateSeries(); applyTheme();
      toast("Backup restored");
      render();
    }catch(e){ alert("Could not read that file. Make sure it is a Sadhana backup .json file."); }
  };
  reader.readAsText(file);
}

/* ---------------- theme ---------------- */
function applyTheme(){ document.body.setAttribute("data-theme", settings.theme||"dark"); }

/* ---------------- init ---------------- */
applyTheme();
navigate("dashboard");
/* position indicator after first paint so offsetLeft/Width are accurate */
requestAnimationFrame(updateNavIndicator);

/* ---------------- PWA service worker registration ---------------- */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("service-worker.js").catch(()=>{});
  });
}
</script>
